<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Locations MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>QA Locations</h1>
      </header>

      <section id="main-view" class="card">
        <div class="section-header">
          <h2>Input</h2>
          <button
            id="open-settings"
            type="button"
            class="icon-btn"
            title="Settings"
          >
            ⚙️
          </button>
        </div>

        <div class="inputs-grid">
          <div class="input-group">
            <div class="input-actions">
              <button
                id="import-locations-btn"
                type="button"
                class="secondary import-btn"
              >
                Import Locations (CSV)
              </button>
              <p class="field-status">Opens importer page</p>
            </div>
            <label for="locations">Locations</label>
            <textarea
              id="locations"
              placeholder="Paste one location per line"
            ></textarea>
          </div>
          <div class="input-group">
            <div class="input-actions">
              <button
                id="import-priorities-btn"
                type="button"
                class="secondary import-btn"
              >
                Import Priorities (XLSX)
              </button>
              <p class="field-status">Opens importer page</p>
            </div>
            <label for="priorities">Priorities</label>
            <textarea
              id="priorities"
              placeholder="Paste one priority per line"
            ></textarea>
          </div>
        </div>

        <div class="buttons">
          <button id="create" type="button">Create</button>
          <button id="reset" type="button" class="secondary">Reset</button>
        </div>
      </section>

      <section id="settings-view" class="card hidden" aria-live="polite">
        <div class="section-header">
          <h2>Settings</h2>
          <button
            id="close-settings"
            type="button"
            class="icon-btn"
            title="Back to input"
          >
            ✕
          </button>
        </div>

        <p class="helper">
          Create columns, rename titles, and set the letter mappings.
        </p>

        <div id="groups-list" class="groups-list"></div>

        <button id="add-group" type="button" class="secondary">
          Add Column
        </button>

        <div class="settings-grid">
          <div>
            <label for="max-rows">Max rows per column (0 = no limit)</label>
            <input id="max-rows" type="number" min="0" value="20" />
          </div>
          <div>
            <label for="column-gap">Column gap</label>
            <input id="column-gap" type="number" min="0" value="1" />
          </div>
        </div>

        <div class="settings-toggle">
          <label class="checkbox">
            <input id="hold-view" type="checkbox" />
            Hold last view on reopen
          </label>
        </div>

        <div class="buttons">
          <button id="settings-reset" type="button" class="secondary">
            Reset
          </button>
          <button id="settings-save" type="button">Save</button>
        </div>
      </section>

      <section id="result-view" class="card hidden" aria-live="polite">
        <div class="section-header">
          <h2>Arrangement</h2>
          <div class="header-actions">
            <button
              id="copy-table-image"
              type="button"
              class="secondary compact-btn"
            >
              Copy PNG
            </button>
            <button
              id="save-table-image"
              type="button"
              class="secondary compact-btn"
            >
              Save PNG
            </button>
            <button
              id="result-back"
              type="button"
              class="icon-btn"
              title="Back to input"
            >
              ↩
            </button>
          </div>
        </div>

        <p id="summary" class="helper"></p>
        <p
          id="result-action-status"
          class="field-status"
          aria-live="polite"
        ></p>
        <div id="table-container"></div>
      </section>
    </main>

    <script src="logic.js"></script>
    <script src="vendor/html2canvas.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
